{% extends "base.html" %}
{% block title %}simu · Reset password{% endblock %}
{% block body %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;">
<div style="max-width:400px;width:100%;">
  <a href="/login" class="logo" style="margin-bottom:32px;display:flex;">
    <div class="logo-dot"></div>
    <div style="margin-left:10px;"><div class="logo-text">simu</div><div class="logo-sub">by Sakaza Afrika</div></div>
  </a>
  <h1 style="font-size:22px;font-weight:500;margin-bottom:4px;">Reset your password</h1>
  <p style="color:var(--muted);font-size:13px;margin-bottom:24px;">We'll send a reset link to your email.</p>
  {% if message %}
  <div class="alert alert-success">{{ message }}</div>
  {% endif %}
  <form method="POST">
    <div class="field">
      <label>Email address</label>
      <input type="email" name="email" placeholder="you@organisation.com" required>
    </div>
    <button type="submit" class="btn btn-primary btn-full">Send reset link</button>
  </form>
  <p style="text-align:center;margin-top:16px;font-size:13px;color:var(--muted);">
    <a href="/login">← Back to login</a>
  </p>
</div>
</div>
{% endblock %}
